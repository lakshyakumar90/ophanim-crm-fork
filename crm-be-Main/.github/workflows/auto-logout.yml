name: Auto Logout

on:
  schedule:
    # 6:15 PM IST = 12:45 UTC (day shift)
    - cron: "45 12 * * *"
    # 4:15 AM IST = 22:45 UTC (night shift)
    - cron: "45 22 * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  auto-logout:
    runs-on: ubuntu-latest
    steps:
      - name: Call Auto Logout API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          echo "Triggering auto-logout at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            "${API_URL}/api/v1/internal/auto-logout")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          
          if [ "$http_code" != "200" ]; then
            echo "Auto-logout failed with status $http_code"
            exit 1
          fi
          
          echo "Auto-logout completed successfully"
